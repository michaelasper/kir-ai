name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_CACHE_VERSION: "v1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_TOOLCHAIN: "1.95.0"

# Cargo cache strategy:
# - Job-specific primary keys let parallel jobs save the target shape they build.
# - Shared restore prefixes let build, clippy, test, and gate lanes reuse
#   dependency artifacts from the same OS, runner architecture, Rust toolchain,
#   and Cargo.lock when available.
# - Restored target artifacts are only hints. Cargo/rustc fingerprints decide
#   whether an artifact is valid and rebuild deterministically on misses.
# - sccache was evaluated for Rust compilation reuse but is deferred until
#   GitHub Actions timing shows it improves this workspace beyond target reuse.

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.job }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cargo clippy --workspace --exclude llm-metal --all-targets --all-features -- -D warnings
          cargo clippy -p llm-metal --all-targets -- -D warnings

  admin-schema-drift:
    name: Admin Schema Drift
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.job }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-

      - name: Generate admin API schemas
        run: cargo test -p llm-server --all-features --lib generate_admin_api_schemas

      - name: Verify API schemas are up-to-date
        run: |
          if [ -n "$(git status --porcelain docs/schemas/admin/)" ]; then
            echo "Error: API schemas are out of date. Please run 'cargo test -p llm-server --all-features --lib generate_admin_api_schemas' locally and commit the changes."
            git diff docs/schemas/admin/
            exit 1
          fi

  compile-check:
    name: Compile Check (No Metal)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # PR CI keeps a cheap non-Metal type lane for lib, bin, test, and bench
    # targets. Dedicated macOS smoke and nightly lanes cover Metal.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.job }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-

      - name: Check all targets without Metal
        run: cargo check --workspace --all-targets --exclude llm-metal --no-default-features --features llm-engine/mlx,llm-engine/diagnostics,llm-engine/tool-calls,llm-server/tool-calls,llm-telemetry/tool-calls

  metal-smoke:
    name: Metal Smoke
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.job }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-

      - name: Run Metal smoke tests
        run: cargo test -p llm-metal --test metal_smoke -- --test-threads=1

  nextest-fast-packages:
    name: Nextest Fast Packages
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.job }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-

      - name: Clear stale nextest report
        run: rm -f target/nextest/pr-ci/junit.xml

      - name: Run nextest fast package lane
        run: cargo nextest run --profile pr-ci -p llm-kv-cache -p llm-sampler

      - name: Upload nextest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-pr-ci-junit
          path: target/nextest/pr-ci/junit.xml
          if-no-files-found: warn
          retention-days: 14

  north-star-gates:
    name: North-Star Gate Report
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.job }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ env.CARGO_CACHE_VERSION }}-

      - name: Clear stale gate reports
        run: rm -rf target/north-star-gates target/release-notes-preview.md

      - name: Enforce versioning
        run: bash scripts/check-versioning.sh

      - name: Enforce conventional commits
        run: bash scripts/check-conventional-commits.sh

      - name: Generate release notes preview
        run: |
          mkdir -p target
          bash scripts/generate-release-notes.sh > target/release-notes-preview.md

      - name: Run north-star gates
        run: bash scripts/north-star-gates.sh ci

      - name: Publish gate summary
        if: always()
        run: |
          if [ -f target/north-star-gates/ci-report.md ]; then
            cat target/north-star-gates/ci-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "North-star CI report was not produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: north-star-ci-report
          path: |
            target/north-star-gates/
            target/release-notes-preview.md
          retention-days: 14
