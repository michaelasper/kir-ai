name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  formatting:
    name: Formatting
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup component add rustfmt --toolchain "$RUST_TOOLCHAIN"
          rustup default "$RUST_TOOLCHAIN"

      - name: Check formatting
        run: cargo fmt --all -- --check

  build:
    name: Workspace Build
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      - name: Build workspace
        run: cargo build --workspace

  lints:
    name: Clippy
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup component add clippy --toolchain "$RUST_TOOLCHAIN"
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-

      - name: Run strict clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  tests:
    name: Workspace Tests
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run workspace tests
        run: cargo test --workspace

  installer-smoke:
    name: Installer Smoke Test
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate macOS installer
        run: |
          bash scripts/install-macos.sh --check
          KIR_AI_FORCE_CLONE=1 \
            KIR_AI_REPO_URL="$GITHUB_WORKSPACE" \
            KIR_AI_REF="$(git rev-parse HEAD)" \
            KIR_AI_DIR="$RUNNER_TEMP/kir-ai-install-smoke" \
            KIR_AI_SKIP_PYTHON=1 \
            KIR_AI_SKIP_BUILD=1 \
            bash scripts/install-macos.sh

  north-star-gates:
    name: North-Star Gate Report
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup component add rustfmt clippy --toolchain "$RUST_TOOLCHAIN"
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gates-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-gates-
            ${{ runner.os }}-cargo-

      - name: Enforce versioning
        run: bash scripts/check-versioning.sh

      - name: Enforce conventional commits
        run: bash scripts/check-conventional-commits.sh

      - name: Generate release notes preview
        run: |
          mkdir -p target
          bash scripts/generate-release-notes.sh > target/release-notes-preview.md

      - name: Run north-star gates
        run: bash scripts/north-star-gates.sh ci

      - name: Publish gate summary
        if: always()
        run: |
          if [ -f target/north-star-gates/ci-report.md ]; then
            cat target/north-star-gates/ci-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "North-star CI report was not produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: north-star-ci-report
          path: |
            target/north-star-gates/
            target/release-notes-preview.md
          retention-days: 14
