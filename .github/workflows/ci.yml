name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-analysis-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-analysis-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-test-

      - name: Run workspace tests
        run: cargo test --workspace --all-features

      - name: Verify API schemas are up-to-date
        run: |
          if [ -n "$(git status --porcelain docs/schemas/admin/)" ]; then
            echo "Error: API schemas are out of date. Please run 'cargo test -p llm-engine generate_admin_api_schemas' locally and commit the changes."
            git diff docs/schemas/admin/
            exit 1
          fi

  build:
    name: Build
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact_name: kir-ai-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p llm-engine

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact_name }}.tar.gz llm-engine
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.tar.gz

  north-star-gates:
    name: North-Star Gate Report
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-gates-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-gates-

      - name: Enforce versioning
        run: bash scripts/check-versioning.sh

      - name: Enforce conventional commits
        run: bash scripts/check-conventional-commits.sh

      - name: Generate release notes preview
        run: |
          mkdir -p target
          bash scripts/generate-release-notes.sh > target/release-notes-preview.md

      - name: Run north-star gates
        run: bash scripts/north-star-gates.sh ci

      - name: Publish gate summary
        if: always()
        run: |
          if [ -f target/north-star-gates/ci-report.md ]; then
            cat target/north-star-gates/ci-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "North-star CI report was not produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: north-star-ci-report
          path: |
            target/north-star-gates/
            target/release-notes-preview.md
          retention-days: 14
