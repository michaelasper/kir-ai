name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-analysis-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-analysis-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  admin-schema-drift:
    name: Admin Schema Drift
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-schema-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-schema-

      - name: Generate admin API schemas
        run: cargo test -p llm-server --all-features --lib generate_admin_api_schemas

      - name: Verify API schemas are up-to-date
        run: |
          if [ -n "$(git status --porcelain docs/schemas/admin/)" ]; then
            echo "Error: API schemas are out of date. Please run 'cargo test -p llm-server --all-features --lib generate_admin_api_schemas' locally and commit the changes."
            git diff docs/schemas/admin/
            exit 1
          fi

  compile-check:
    name: Compile Check
    runs-on: macos-latest
    timeout-minutes: 20
    # PR CI uses cargo check for fast type coverage across lib, bin, test, and
    # bench targets. Release and nightly workflows keep full link/package builds.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-check-

      - name: Check all targets
        run: cargo check --workspace --all-targets

  nextest-fast-packages:
    name: Nextest Fast Packages
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-nextest-fast-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-nextest-fast-

      - name: Run nextest fast package lane
        run: cargo nextest run --profile pr-ci -p llm-kv-cache -p llm-sampler

      - name: Upload nextest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-pr-ci-junit
          path: target/nextest/pr-ci/junit.xml
          if-no-files-found: warn
          retention-days: 14

  north-star-gates:
    name: North-Star Gate Report
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-gates-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-gates-

      - name: Enforce versioning
        run: bash scripts/check-versioning.sh

      - name: Enforce conventional commits
        run: bash scripts/check-conventional-commits.sh

      - name: Generate release notes preview
        run: |
          mkdir -p target
          bash scripts/generate-release-notes.sh > target/release-notes-preview.md

      - name: Run north-star gates
        run: bash scripts/north-star-gates.sh ci

      - name: Publish gate summary
        if: always()
        run: |
          if [ -f target/north-star-gates/ci-report.md ]; then
            cat target/north-star-gates/ci-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "North-star CI report was not produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: north-star-ci-report
          path: |
            target/north-star-gates/
            target/release-notes-preview.md
          retention-days: 14
