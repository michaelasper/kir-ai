name: Nightly

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  north-star-nightly:
    name: Nightly North-Star Gates
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      LLM_BENCH_ENDPOINT: ${{ vars.LLM_BENCH_ENDPOINT }}
      LLM_BENCH_MODEL: ${{ vars.LLM_BENCH_MODEL }}
      LLM_BENCH_SNAPSHOT: ${{ vars.LLM_BENCH_SNAPSHOT }}
      LLM_BENCH_BASELINE: ${{ vars.LLM_BENCH_BASELINE }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup component add rustfmt clippy --toolchain "$RUST_TOOLCHAIN"
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-
            ${{ runner.os }}-cargo-

      - name: Run nightly gates
        run: bash scripts/north-star-gates.sh nightly

      - name: Publish gate summary
        if: always()
        run: |
          if [ -f target/north-star-gates/nightly-report.md ]; then
            cat target/north-star-gates/nightly-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "North-star nightly report was not produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: north-star-nightly-report
          path: target/north-star-gates/
          retention-days: 30
