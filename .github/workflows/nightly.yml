name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_TOOLCHAIN: "1.95.0"

permissions:
  contents: write

jobs:
  nightly-validation:
    name: Nightly Validation
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-nightly-validation-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-nightly-validation-

      - name: Run nightly north-star gates with deep Metal and MLX reference validation
        run: bash scripts/north-star-gates.sh nightly

      - name: Publish nightly gate summary
        if: always()
        run: |
          if [ -f target/north-star-gates/nightly-report.md ]; then
            cat target/north-star-gates/nightly-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "North-star nightly report was not produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload nightly gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: north-star-nightly-report
          path: target/north-star-gates/
          retention-days: 30

  nightly-build:
    name: Nightly Build
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact_name: kir-ai-darwin-arm64-nightly

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo +nightly build --release --target ${{ matrix.target }} -p llm-engine

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact_name }}-${{ steps.date.outputs.date }}.tar.gz llm-engine
          cd -

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build (${{ steps.date.outputs.date }})
          body: |
            ## Nightly Build - ${{ steps.date.outputs.date }}
            
            This is an automated nightly build from the main branch.
            
            **⚠️ Warning:** Nightly builds may contain unstable features and bugs. Use at your own risk!
            
            ### Installation
            
            Download the appropriate binary for your platform:
            
            ```bash
            # macOS (Apple Silicon)
            curl -L https://github.com/michaelasper/kir-ai/releases/download/nightly/kir-ai-darwin-arm64-nightly-${{ steps.date.outputs.date }}.tar.gz | tar xz
            sudo mv llm-engine /usr/local/bin/kirai
            ```
            
            ### Changelog
            
            Built from commit: `${{ github.sha }}`
          files: ${{ matrix.artifact_name }}-${{ steps.date.outputs.date }}.tar.gz
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
