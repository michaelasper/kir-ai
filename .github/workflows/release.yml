name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release (Dry Run)
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dry_run: true

  build-linux:
    name: Build (Linux)
    needs: prepare
    if: needs.prepare.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-gnu

      - name: Build binary
        run: cargo build --release --target x86_64-unknown-linux-gnu -p llm-engine

      - name: Package
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar czf ../../../kir-ai-linux-amd64.tar.gz llm-engine
          cd -

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kir-ai-linux-amd64
          path: kir-ai-linux-amd64.tar.gz

  build-macos:
    name: Build (macOS)
    needs: prepare
    if: needs.prepare.outputs.new_release_published == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-darwin

      - name: Build binary
        run: cargo build --release --target aarch64-apple-darwin -p llm-engine

      - name: Package
        run: |
          cd target/aarch64-apple-darwin/release
          tar czf ../../../kir-ai-darwin-arm64.tar.gz llm-engine
          cd -

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kir-ai-darwin-arm64
          path: kir-ai-darwin-arm64.tar.gz

  publish:
    name: Publish Release
    needs: [prepare, build-linux, build-macos]
    if: needs.prepare.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: kir-ai-linux-amd64

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: kir-ai-darwin-arm64

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
