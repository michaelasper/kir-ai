[tools]
rust = "1.95.0"

[tasks.fmt]
description = "Format the Rust workspace"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Check Rust formatting"
run = "cargo fmt --all --check"

[tasks.test]
description = "Run broad Rust workspace tests for nightly/full validation"
run = "cargo test --workspace --all-features"

[tasks.clippy]
description = "Run strict Rust lints"
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks.check]
description = "Run formatting, tests, and clippy"
depends = ["fmt-check", "test", "clippy"]

[tasks.check-compile]
description = "Compile all workspace targets without running tests"
run = "cargo check --workspace --all-targets"

# Focused validation lanes. Keep these tasks composable so local iteration and
# CI can call the same aliases without defaulting to full workspace tests.
[tasks.check-fast]
description = "Run compile baseline plus fast cache, sampler, and API contract slices"
run = """
cargo check --workspace --all-targets
cargo test -p llm-kv-cache
cargo test -p llm-sampler
cargo test -p llm-api --test openai_contract
"""

[tasks.test-nextest-pr]
description = "Run the PR nextest lane for fast package scheduling and slow-test reporting"
run = "cargo nextest run --profile pr-ci -p llm-kv-cache -p llm-sampler"

[tasks.test-slow-timeouts]
description = "Run ignored wall-clock timeout and stall tests routed out of fast lanes"
run = "cargo test -p llm-engine --lib mlx_slow_ -- --ignored --test-threads=1"

[tasks.test-cache]
description = "Run KV cache unit tests"
run = "cargo test -p llm-kv-cache"

[tasks.test-sampler]
description = "Run sampler unit tests"
run = "cargo test -p llm-sampler"

[tasks.test-api-contract]
description = "Run OpenAI API contract tests"
run = "cargo test -p llm-api --test openai_contract"

[tasks.test-runtime-contract]
description = "Run all runtime contract tests"
run = "cargo test -p llm-runtime --test runtime_contract"

[tasks.test-runtime-chat]
description = "Run runtime chat contract tests"
run = "cargo test -p llm-runtime --test runtime_contract chat::"

[tasks.test-runtime-completion]
description = "Run runtime completion contract tests"
run = "cargo test -p llm-runtime --test runtime_contract completion::"

[tasks.test-runtime-streaming]
description = "Run runtime streaming contract tests"
run = "cargo test -p llm-runtime --test runtime_contract streaming::"

[tasks.test-runtime-tools]
description = "Run runtime tool validation contract tests"
run = "cargo test -p llm-runtime --test runtime_contract tool_validation::"

[tasks.test-runtime-json]
description = "Run runtime JSON mode contract tests"
run = "cargo test -p llm-runtime --test runtime_contract json_mode::"

[tasks.test-runtime-no-progress]
description = "Run runtime no-progress contract tests"
run = "cargo test -p llm-runtime --test runtime_contract no_progress::"

[tasks.test-parser]
description = "Run tool parser tests"
run = "cargo test -p llm-tool-parser"

[tasks.test-tokenizer]
description = "Run tokenizer and chat-template tests"
run = "cargo test -p llm-tokenizer"

[tasks.test-parser-tokenizer]
description = "Run parser and tokenizer tests"
depends = ["test-parser", "test-tokenizer"]

[tasks.test-hub]
description = "Run model hub download planning tests"
run = "cargo test -p llm-hub --test download_plan"

[tasks.test-backend-cpu]
description = "Run backend CPU safetensors and native math tests"
run = "cargo test -p llm-backend --test safetensors_loader"

[tasks.test-metal-smoke]
description = "Run serialized Metal smoke tests"
run = "cargo test -p llm-metal --test metal_smoke -- --test-threads=1"

[tasks.gates-ci]
description = "Run PR north-star product gates with JSON and Markdown reports"
run = "bash scripts/north-star-gates.sh ci"

[tasks.gates-nightly]
description = "Run nightly broad validation and north-star gates with JSON and Markdown reports"
run = "bash scripts/north-star-gates.sh nightly"

[tasks.run]
description = "Run the llm-engine server with an inference-backed snapshot"
run = "mise run run-inference"

[tasks.run-inference]
description = "Run the llm-engine server with LLM_ENGINE_SNAPSHOT or LLM_ENGINE_SNAPSHOT_ALIAS"
run = """
bash -lc '
set -euo pipefail
snapshot_args=()
if [ -n "${LLM_ENGINE_SNAPSHOT:-}" ]; then
  snapshot_args=(--snapshot "$LLM_ENGINE_SNAPSHOT")
elif [ -n "${LLM_ENGINE_SNAPSHOT_ALIAS:-}" ]; then
  snapshot_args=(--snapshot-alias "$LLM_ENGINE_SNAPSHOT_ALIAS")
else
  echo "LLM_ENGINE_SNAPSHOT or LLM_ENGINE_SNAPSHOT_ALIAS is required for inference serving" >&2
  echo "Use: mise run run-protocol for the deterministic protocol backend" >&2
  exit 2
fi
loader_args=()
if [ -n "${LLM_ENGINE_LOADER:-}" ]; then
  loader_args=(--loader "$LLM_ENGINE_LOADER")
fi
family_args=()
if [ -n "${LLM_ENGINE_FAMILY:-}" ]; then
  family_args=(--family "$LLM_ENGINE_FAMILY")
fi
mlx_args=()
if [ -n "${MLX_LM_ENDPOINT:-}" ]; then
  mlx_args=(--mlx-endpoint "$MLX_LM_ENDPOINT")
fi
model_id="${LLM_ENGINE_MODEL:-${LLM_ENGINE_SNAPSHOT_ALIAS:-local-qwen36}}"
cargo run -p llm-engine -- serve \
  --addr "${LLM_ENGINE_ADDR:-127.0.0.1:3000}" \
  "${snapshot_args[@]}" \
  --model-id "$model_id" \
  "${loader_args[@]}" \
  "${family_args[@]}" \
  "${mlx_args[@]}" \
  --max-new-tokens "${LLM_ENGINE_MAX_NEW_TOKENS:-256}" \
  --max-prefill-tokens "${LLM_ENGINE_MAX_PREFILL_TOKENS:-2048}"
'
"""

[tasks.run-protocol]
description = "Run the deterministic protocol backend for HTTP/client contract tests"
run = "cargo run -p llm-engine --features test-utils -- serve --protocol-test-backend --i-understand-this-is-not-real-inference"

[tasks.bench-qwen-long-context-plan]
description = "Print the Qwen 135K/200K/256K long-context benchmark plan without running inference"
run = "cargo run -p llm-engine -- bench qwen-long-context --dry-run --profile all --model \"${LLM_BENCH_MODEL:-local-qwen36}\" ${LLM_BENCH_SNAPSHOT:+--snapshot \"$LLM_BENCH_SNAPSHOT\"} ${LLM_BENCH_BASELINE:+--baseline \"$LLM_BENCH_BASELINE\"} ${LLM_BENCH_OUTPUT:+--output \"$LLM_BENCH_OUTPUT\"}"

[tasks.bench-qwen-mlx-cache-prefill-plan]
description = "Print the Qwen MLX cache/prefill sweep plan without running inference"
run = """
bash -lc '
set -euo pipefail
test -n "${LLM_BENCH_SNAPSHOT:-}" || (echo "LLM_BENCH_SNAPSHOT is required" >&2; exit 2)
cargo run -p llm-engine -- bench qwen-mlx-tool-normalized \
  --dry-run \
  --sweep-profile qwen-mlx-cache-prefill \
  --snapshot "$LLM_BENCH_SNAPSHOT" \
  --warmups "${LLM_BENCH_WARMUPS:-1}" \
  --samples "${LLM_BENCH_SAMPLES:-1}" \
  --context-tokens "${LLM_BENCH_CONTEXT_TOKENS:-135000}" \
  --concurrent-requests "${LLM_BENCH_CONCURRENT_REQUESTS:-4}" \
  --concurrent-samples "${LLM_BENCH_CONCURRENT_SAMPLES:-1}" \
  ${LLM_BENCH_OUTPUT:+--output "$LLM_BENCH_OUTPUT"}
'
"""

[tasks.bench-qwen-mlx-cache-prefill]
description = "Run the Qwen MLX cache/prefill sweep against externally launched sidecars"
run = """
bash -lc '
set -euo pipefail
test -n "${LLM_BENCH_SNAPSHOT:-}" || (echo "LLM_BENCH_SNAPSHOT is required" >&2; exit 2)
cargo run -p llm-engine -- bench qwen-mlx-tool-normalized \
  --sweep-profile qwen-mlx-cache-prefill \
  --snapshot "$LLM_BENCH_SNAPSHOT" \
  --warmups "${LLM_BENCH_WARMUPS:-1}" \
  --samples "${LLM_BENCH_SAMPLES:-3}" \
  --context-tokens "${LLM_BENCH_CONTEXT_TOKENS:-135000}" \
  --concurrent-requests "${LLM_BENCH_CONCURRENT_REQUESTS:-4}" \
  --concurrent-samples "${LLM_BENCH_CONCURRENT_SAMPLES:-1}" \
  --output "${LLM_BENCH_OUTPUT:-.llm-bench/traces/qwen-mlx-cache-prefill.json}"
'
"""

[tasks.bench-qwen-135k]
description = "Run the release-blocking 135K Qwen long-context promotion gate"
run = """
test -n "$LLM_BENCH_ENDPOINT" || (echo "LLM_BENCH_ENDPOINT is required" >&2; exit 2)
test -n "$LLM_BENCH_SNAPSHOT" || (echo "LLM_BENCH_SNAPSHOT is required" >&2; exit 2)
cargo run -p llm-engine -- bench qwen-long-context --profile 135k --endpoint "$LLM_BENCH_ENDPOINT" --model "${LLM_BENCH_MODEL:-local-qwen36}" --snapshot "$LLM_BENCH_SNAPSHOT" --output "${LLM_BENCH_OUTPUT:-.llm-bench/traces/qwen-135k.json}" ${LLM_BENCH_BASELINE:+--baseline "$LLM_BENCH_BASELINE"}
"""

[tasks.bench-qwen-200k]
description = "Run the non-blocking 200K Qwen frontier characterization pass"
run = """
test -n "$LLM_BENCH_ENDPOINT" || (echo "LLM_BENCH_ENDPOINT is required" >&2; exit 2)
test -n "$LLM_BENCH_SNAPSHOT" || (echo "LLM_BENCH_SNAPSHOT is required" >&2; exit 2)
cargo run -p llm-engine -- bench qwen-long-context --profile 200k --endpoint "$LLM_BENCH_ENDPOINT" --model "${LLM_BENCH_MODEL:-local-qwen36}" --snapshot "$LLM_BENCH_SNAPSHOT" --output "${LLM_BENCH_OUTPUT:-.llm-bench/traces/qwen-200k.json}" ${LLM_BENCH_BASELINE:+--baseline "$LLM_BENCH_BASELINE"}
"""

[tasks.bench-qwen-256k]
description = "Run the non-blocking 256K Qwen max-context characterization pass"
run = """
test -n "$LLM_BENCH_ENDPOINT" || (echo "LLM_BENCH_ENDPOINT is required" >&2; exit 2)
test -n "$LLM_BENCH_SNAPSHOT" || (echo "LLM_BENCH_SNAPSHOT is required" >&2; exit 2)
cargo run -p llm-engine -- bench qwen-long-context --profile 256k --endpoint "$LLM_BENCH_ENDPOINT" --model "${LLM_BENCH_MODEL:-local-qwen36}" --snapshot "$LLM_BENCH_SNAPSHOT" --output "${LLM_BENCH_OUTPUT:-.llm-bench/traces/qwen-256k.json}" ${LLM_BENCH_BASELINE:+--baseline "$LLM_BENCH_BASELINE"}
"""
