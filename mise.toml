[tools]
rust = "1.95.0"

[tasks.fmt]
description = "Format the Rust workspace"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Check Rust formatting"
run = "cargo fmt --all --check"

[tasks.test]
description = "Run all Rust tests"
run = "cargo test --workspace"

[tasks.clippy]
description = "Run strict Rust lints"
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks.check]
description = "Run formatting, tests, and clippy"
depends = ["fmt-check", "test", "clippy"]

[tasks.gates-ci]
description = "Run fast north-star CI gates with JSON and Markdown reports"
run = "bash scripts/north-star-gates.sh ci"

[tasks.gates-nightly]
description = "Run nightly north-star gates with JSON and Markdown reports"
run = "bash scripts/north-star-gates.sh nightly"

[tasks.run]
description = "Run the llm-engine server"
run = "cargo run -p llm-engine -- serve --deterministic-test-backend"

[tasks.bench-qwen-long-context-plan]
description = "Print the Qwen 135K/200K long-context benchmark plan without running inference"
run = "cargo run -p llm-engine -- bench qwen-long-context --dry-run --profile all --model \"${LLM_BENCH_MODEL:-local-qwen36}\" ${LLM_BENCH_SNAPSHOT:+--snapshot \"$LLM_BENCH_SNAPSHOT\"} ${LLM_BENCH_BASELINE:+--baseline \"$LLM_BENCH_BASELINE\"} ${LLM_BENCH_OUTPUT:+--output \"$LLM_BENCH_OUTPUT\"}"

[tasks.bench-qwen-135k]
description = "Run the release-blocking 135K Qwen long-context promotion gate"
run = """
test -n "$LLM_BENCH_ENDPOINT" || (echo "LLM_BENCH_ENDPOINT is required" >&2; exit 2)
test -n "$LLM_BENCH_SNAPSHOT" || (echo "LLM_BENCH_SNAPSHOT is required" >&2; exit 2)
cargo run -p llm-engine -- bench qwen-long-context --profile 135k --endpoint "$LLM_BENCH_ENDPOINT" --model "${LLM_BENCH_MODEL:-local-qwen36}" --snapshot "$LLM_BENCH_SNAPSHOT" --output "${LLM_BENCH_OUTPUT:-.llm-bench/traces/qwen-135k.json}" ${LLM_BENCH_BASELINE:+--baseline "$LLM_BENCH_BASELINE"}
"""

[tasks.bench-qwen-200k]
description = "Run the non-blocking 200K Qwen frontier characterization pass"
run = """
test -n "$LLM_BENCH_ENDPOINT" || (echo "LLM_BENCH_ENDPOINT is required" >&2; exit 2)
test -n "$LLM_BENCH_SNAPSHOT" || (echo "LLM_BENCH_SNAPSHOT is required" >&2; exit 2)
cargo run -p llm-engine -- bench qwen-long-context --profile 200k --endpoint "$LLM_BENCH_ENDPOINT" --model "${LLM_BENCH_MODEL:-local-qwen36}" --snapshot "$LLM_BENCH_SNAPSHOT" --output "${LLM_BENCH_OUTPUT:-.llm-bench/traces/qwen-200k.json}" ${LLM_BENCH_BASELINE:+--baseline "$LLM_BENCH_BASELINE"}
"""
